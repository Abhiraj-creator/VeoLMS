
<style>
#erd { padding: 0.5rem 0; }
#erd svg { width: 100%; }
.mermaid-note { font-size: 12px; color: var(--text-secondary); margin-top: 8px; padding: 0 4px; }
</style>
<div id="erd"></div>
<p class="mermaid-note">Click any entity name in the diagram to ask about it.</p>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#2a2a28' : '#f1efe8',
    primaryBorderColor: dark ? '#5f5e5a' : '#b4b2a9',
    primaryTextColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});

const diagram = `erDiagram
  USER {
    ObjectId _id PK
    string name
    string email
    string passwordHash
    string role
    string avatar
    boolean isActive
    date createdAt
    date updatedAt
  }

  COURSE {
    ObjectId _id PK
    ObjectId createdBy FK
    string title
    string slug
    string category
    string shortDescription
    string description
    string thumbnail
    string trailerVideo
    number price
    boolean isPublished
    number totalDuration
    number totalLessons
    string[] tags
    date createdAt
    date updatedAt
  }

  SECTION {
    ObjectId _id PK
    ObjectId course FK
    string title
    number order
    date createdAt
  }

  LESSON {
    ObjectId _id PK
    ObjectId section FK
    ObjectId course FK
    string title
    string videoUrl
    string cloudinaryPublicId
    number duration
    number order
    boolean isPreview
    date createdAt
  }

  ENROLLMENT {
    ObjectId _id PK
    ObjectId student FK
    ObjectId course FK
    string razorpayOrderId
    string razorpayPaymentId
    number amount
    string status
    ObjectId lastWatchedLesson FK
    number progressPercent
    date enrolledAt
    date updatedAt
  }

  PROGRESS {
    ObjectId _id PK
    ObjectId student FK
    ObjectId lesson FK
    ObjectId course FK
    number watchedSeconds
    number totalSeconds
    boolean completed
    date lastWatchedAt
    date updatedAt
  }

  REVIEW {
    ObjectId _id PK
    ObjectId student FK
    ObjectId course FK
    number rating
    string comment
    date createdAt
  }

  USER ||--o{ COURSE : "creates"
  USER ||--o{ ENROLLMENT : "has"
  USER ||--o{ PROGRESS : "tracks"
  USER ||--o{ REVIEW : "writes"
  COURSE ||--|{ SECTION : "contains"
  SECTION ||--|{ LESSON : "contains"
  LESSON }o--|| COURSE : "belongs to"
  COURSE ||--o{ ENROLLMENT : "enrolled in"
  COURSE ||--o{ PROGRESS : "tracked in"
  COURSE ||--o{ REVIEW : "reviewed in"
  ENROLLMENT }o--o| LESSON : "last watched"
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
